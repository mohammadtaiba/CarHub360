<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CarHub360 API</title>
    <link rel="stylesheet" href="../webjars/swagger-ui/4.18.2/swagger-ui.css" />
</head>
<body>
<div id="swagger-ui"></div>
<script src="../webjars/swagger-ui/4.18.2/swagger-ui-bundle.js"></script>
<script src="../webjars/swagger-ui/4.18.2/swagger-ui-standalone-preset.js"></script>
<script>
    window.onload = function() {
        SwaggerUIBundle({
            // use a relative path so the UI works when the application
            // is deployed with a context root (e.g. /carhub360)
            url: '../api/openapi.json',
            dom_id: '#swagger-ui',
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIStandalonePreset
            ],
            layout: "BaseLayout"
        });
    };
</script>
</body>
</html>
